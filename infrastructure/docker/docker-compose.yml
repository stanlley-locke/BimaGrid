services:

  postgres:
    image: postgres:16-alpine
    container_name: bimagrid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bimagrid}
      POSTGRES_USER: ${POSTGRES_USER:-bimagrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bimagrid}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-bimagrid} -d $${POSTGRES_DB:-bimagrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bimagrid-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfiles/backend.Dockerfile
    container_name: bimagrid-backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-django-insecure-bimagrid-development-secret-key}
      DEBUG: ${DEBUG:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${POSTGRES_DB:-bimagrid}
      DATABASE_USER: ${POSTGRES_USER:-bimagrid}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-bimagrid}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - backend-static:/app/backend/staticfiles
      - backend-media:/app/backend/media

  nginx:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfiles/nginx.Dockerfile
    container_name: bimagrid-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - backend-static:/static:ro
      - backend-media:/media:ro

volumes:
  postgres-data:
  redis-data:
  backend-static:
  backend-media:
