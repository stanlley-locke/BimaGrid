# ============================================================
# BimaGrid — Nginx Reverse Proxy Configuration
# Nginx 1.25+ (Alpine)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------- Logging ---------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # --------------- Body size ---------------
    client_max_body_size 10m;

    # --------------- Gzip ---------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # --------------- Security headers ---------------
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    server_tokens off;

    # --------------- Upstreams ---------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream ussd {
        server ussd:8001;
        keepalive 16;
    }

    upstream gateway {
        server api-gateway:3001;
        keepalive 32;
    }

    # --------------- Rate limiting ---------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ussd:10m rate=30r/m;

    # ============================================================
    # HTTP Server — port 80
    # ============================================================
    server {
        listen 80;
        server_name _;

        # ---- Health probe (used by Docker / load balancers) ----
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ---- Django REST API ----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ---- Django admin ----
        location /admin/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Static & media files served from named volumes ----
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ---- USSD Gateway (Africa's Talking callback endpoint) ----
        location /ussd/gateway/ {
            limit_req zone=ussd burst=10 nodelay;

            proxy_pass         http://ussd;
            proxy_http_version 1.1;
            proxy_set_header   Connection          "";
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            # Africa's Talking expects these to be preserved
            proxy_set_header   X-AT-Session-ID     $http_x_at_session_id;
            proxy_set_header   X-AT-Network-Code   $http_x_at_network_code;
            proxy_set_header   X-AT-Phone-Number   $http_x_at_phone_number;
            proxy_read_timeout 30s;
        }

        # ---- Fallback → API Gateway (Next.js / React front-end) ----
        location / {
            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            # Required for WebSocket upgrade (Next.js HMR in dev)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}

# ============================================================
# gRPC passthrough — port 50051
# ============================================================
stream {
    log_format stream '$remote_addr [$time_local] $protocol $status '
                      'bytes_sent=$bytes_sent bytes_received=$bytes_received '
                      'duration=$session_time';

    access_log /var/log/nginx/grpc_access.log stream;

    upstream grpc_backend {
        server backend:50051;
    }

    server {
        listen 50051;
        proxy_pass grpc_backend;
        proxy_timeout 10m;
        proxy_connect_timeout 5s;
    }
}
