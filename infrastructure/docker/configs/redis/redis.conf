# ============================================================
# BimaGrid — Redis 7 Configuration
# ============================================================

# --------------- Network ---------------
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
protected-mode no

# --------------- General ---------------
daemonize no
loglevel notice
databases 16

# --------------- Persistence (RDB snapshots) ---------------
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# --------------- AOF (Append Only File) ---------------
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --------------- Memory management ---------------
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# --------------- Lazy freeing ---------------
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush no

# --------------- Slow log ---------------
slowlog-log-slower-than 10000
slowlog-max-len 128

# --------------- Security ---------------
# requirepass <set via REDIS_PASSWORD env if needed>
