# ============================================================
# BimaGrid — Docker Compose Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

# Shared production settings anchors
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &restart-policy
  restart: always

x-prod-backend-env: &prod-backend-env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.production
    DATABASE_HOST: postgres
    DATABASE_PORT: 5432
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    GRPC_PORT: 50051

services:
  # ──────────────────────────────────────────────
  # Infrastructure — production hardening
  # ──────────────────────────────────────────────
  postgres:
    <<: *restart-policy
    logging: *default-logging
    ports: !reset []        # Do NOT expose the DB port in production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    <<: *restart-policy
    logging: *default-logging
    ports: !reset []        # Do NOT expose Redis port in production

  # ──────────────────────────────────────────────
  # Backend — scaled + resource-limited
  # ──────────────────────────────────────────────
  backend:
    <<: [*restart-policy, *prod-backend-env]
    logging: *default-logging
    volumes:
      # Remove bind mounts — use only named volumes
      - backend-static:/app/static
      - backend-media:/app/media
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ──────────────────────────────────────────────
  # Celery Worker — production settings
  # ──────────────────────────────────────────────
  celery-worker:
    <<: [*restart-policy, *prod-backend-env]
    logging: *default-logging
    volumes:
      - backend-static:/app/static
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ──────────────────────────────────────────────
  # Celery Beat — single instance, always restart
  # ──────────────────────────────────────────────
  celery-beat:
    <<: [*restart-policy, *prod-backend-env]
    logging: *default-logging
    volumes:
      - backend-static:/app/static

  # ──────────────────────────────────────────────
  # USSD Service
  # ──────────────────────────────────────────────
  ussd:
    <<: *restart-policy
    logging: *default-logging
    ports: !reset []        # Exposed only through nginx

  # ──────────────────────────────────────────────
  # Oracle Node
  # ──────────────────────────────────────────────
  oracle-node:
    <<: *restart-policy
    logging: *default-logging
    environment:
      BACKEND_GRPC_URL: http://backend:50051
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}   # Point to real network in prod
      RUST_LOG: warn

  # ──────────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────────
  api-gateway:
    <<: *restart-policy
    logging: *default-logging
    ports: !reset []
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
      USSD_URL: http://ussd:8001
      PORT: 3001

  # ──────────────────────────────────────────────
  # Frontend — production build (no volume mounts)
  # ──────────────────────────────────────────────
  frontend:
    <<: *restart-policy
    logging: *default-logging
    volumes: !reset []      # Remove bind mounts — image contains built assets
    ports: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

  # ──────────────────────────────────────────────
  # Nginx — expose 80 & 443 for production TLS
  # ──────────────────────────────────────────────
  nginx:
    <<: *restart-policy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - backend-static:/static:ro
      - backend-media:/media:ro
      - ./infrastructure/docker/configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certificates (provisioned by certbot / external secret)
      - ${SSL_CERT_PATH:-./infrastructure/docker/configs/nginx/certs}:/etc/nginx/certs:ro

  # ──────────────────────────────────────────────
  # Hardhat — NOT included in production
  # ──────────────────────────────────────────────
  hardhat:
    profiles:
      - dev-only   # Service only starts when --profile dev-only is passed
